<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="960" height="960">
  <!-- Cadre de porte/fenêtre -->
  <rect x="160" y="120" width="480" height="680" rx="30"
        fill="none" stroke="#333333" stroke-width="52"/>
  <!-- Panneau intérieur -->
  <rect x="240" y="200" width="320" height="520" rx="20"
        fill="none" stroke="#333333" stroke-width="36"/>
  <!-- Poignée -->
  <circle cx="520" cy="460" r="36" fill="#333333"/>
  <!-- Indicateur ouvert — petit cercle vert -->
  <circle cx="750" cy="200" r="90" fill="#00AA44"/>
  <rect x="710" y="170" width="80" height="12" rx="6" fill="#FFFFFF"/>
  <rect x="710" y="195" width="80" height="12" rx="6" fill="#FFFFFF"/>
  <rect x="710" y="220" width="80" height="12" rx="6" fill="#FFFFFF"/>
</svg>
